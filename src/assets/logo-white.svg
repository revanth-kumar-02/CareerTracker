<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="100%" height="100%">
  <defs>
    <!-- Premium Purple Accent Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B3FE6" />
      <stop offset="100%" stop-color="#9175FF" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B3FE6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#9175FF" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Left: The Pathway Symbol scaled down and translated -->
  <g transform="translate(4, 5) scale(0.4)">
    <!-- Ambient background soft glow ring -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="url(#glowGrad)" stroke-width="6" opacity="0.8" />
    
    <!-- Pathway lines -->
    <path d="M 24,76 L 46,50 L 76,24" fill="none" stroke="url(#brandGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 46,50 L 72,58" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-dasharray="1.5 2.5" stroke-linecap="round" />
    <path d="M 46,50 L 32,32" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-dasharray="1.5 2.5" stroke-linecap="round" />

    <!-- Node 1: Base node (Bottom Left) -->
    <circle cx="24" cy="76" r="5" fill="#FFFFFF" stroke="url(#brandGrad)" stroke-width="3" />

    <!-- Node 2: Decision/Transition node (Center) -->
    <circle cx="46" cy="50" r="6" fill="url(#brandGrad)" />
    <circle cx="46" cy="50" r="2.5" fill="#FFFFFF" />

    <!-- Branch Node A -->
    <circle cx="72" cy="58" r="3.5" fill="url(#brandGrad)" opacity="0.7" />

    <!-- Branch Node B -->
    <circle cx="32" cy="32" r="3.5" fill="url(#brandGrad)" opacity="0.7" />

    <!-- Node 3: Ultimate Goal/Success Node (Top Right) -->
    <circle cx="76" cy="24" r="10" fill="url(#brandGrad)" opacity="0.15" />
    <circle cx="76" cy="24" r="7.5" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" stroke-dasharray="2 1.5" />
    <circle cx="76" cy="24" r="4.5" fill="#FFFFFF" stroke="url(#brandGrad)" stroke-width="3.5" />
  </g>

  <!-- Right: Logo Text -->
  <text x="52" y="32" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
    CareerTrack<tspan fill="url(#brandGrad)" font-weight="800">AI</tspan>
  </text>
</svg>
